<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; media-src 'self' blob:; frame-src 'self' blob:; connect-src 'self' https://www.dropbox.com https://api.dropboxapi.com https://content.dropboxapi.com; object-src 'none'; base-uri 'none'; form-action 'none'">
  <title>MASICS Mario Review Viewer</title>
  <link rel="stylesheet" href="assets/styles.css?v=20260707-4">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>MASICS Mario Review Viewer</h1>
      <p id="status-line">Sign in with Dropbox to load the protected review queue.</p>
    </div>
    <div class="auth-actions">
      <button id="sign-in" class="primary">Sign in with Dropbox</button>
      <button id="sign-out" hidden>Sign out</button>
    </div>
  </header>
  <main class="layout">
    <section class="queue-panel">
      <div class="toolbar">
        <input id="search" type="search" placeholder="Search loaded queue" autocomplete="off">
        <select id="filter">
          <option value="all">All</option>
          <option value="pending">Pending</option>
          <option value="reviewed">Reviewed</option>
          <option value="duplicate">Duplicate</option>
        </select>
      </div>
      <div class="queue-summary">
        <span id="queue-counts">0 loaded</span>
        <button id="jump-active" type="button">Current</button>
        <button id="next-pending-top" type="button">Next Pending</button>
      </div>
      <ol id="queue-list" class="queue-list"></ol>
    </section>
    <section class="review-panel">
      <div id="empty-state" class="empty-state">The queue is protected until Dropbox sign-in completes.</div>
      <article id="record-view" hidden>
        <div id="progress-warning" class="progress-warning">Progress is stored in this browser. Export progress after each review session. <span id="last-export">No progress export recorded yet.</span></div>
        <div class="record-header">
          <div>
            <p id="record-position" class="muted"></p>
            <h2 id="record-title"></h2>
          </div>
          <div class="record-actions">
            <button id="previous-record" type="button">Previous</button>
            <button id="next-record" type="button">Next</button>
            <button id="next-pending" class="primary" type="button">Next Pending</button>
            <button id="load-evidence" type="button">Preview Evidence</button>
          </div>
        </div>
        <dl id="record-meta" class="record-meta"></dl>
        <div class="decision-grid">
          <label>Decision
            <select id="decision">
              <option value="">Pending</option>
              <option value="responsive">Responsive</option>
              <option value="nonresponsive">Non-responsive</option>
              <option value="missing">Missing</option>
              <option value="privileged">Privileged / withhold</option>
              <option value="needs_review">Needs further review</option>
              <option value="duplicate">Duplicate</option>
              <option value="delete">Delete / exclude from review list</option>
            </select>
          </label>
          <label>Notes
            <textarea id="notes" rows="4"></textarea>
          </label>
        </div>
        <div class="progress-actions">
          <button id="save-online" class="primary" type="button">Save Online</button>
          <button id="export-progress">Export Progress</button>
          <label class="import-label">Import Progress<input id="import-progress" type="file" accept="application/json"></label>
          <button id="reset-progress">Reset Progress</button>
          <span id="save-status" class="save-status">Autosave ready</span>
        </div>
        <div id="evidence-status" class="muted"></div>
        <div id="preview" class="preview"></div>
      </article>
    </section>
  </main>
  <script src="assets/config.js?v=20260707-3"></script>
  <script src="assets/app.js?v=20260707-12"></script>
  <script src="assets/safe-preview.js?v=20260706-16"></script>
  <script src="assets/tracker.js?v=20260706-16"></script>
  <script src="assets/save-reminder.js?v=20260706-16"></script>
  <script src="assets/save-online-merge.js?v=20260707-9"></script>
</body>
</html>
