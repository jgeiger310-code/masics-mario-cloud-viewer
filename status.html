<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'self' https://www.dropbox.com https://api.dropboxapi.com https://content.dropboxapi.com; img-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'none'">
  <title>MASICS Review Status</title>
  <link rel="stylesheet" href="assets/status.css?v=20260712-1">
</head>
<body>
  <main class="status-shell">
    <header>
      <p class="eyebrow">MASICS REVIEW TRACKER</p>
      <h1>Live Review Status</h1>
      <p id="status-message">Checking the latest Dropbox tracker…</p>
    </header>

    <section id="counts" class="counts" hidden>
      <article><strong id="reviewed">0</strong><span>Reviewed</span></article>
      <article><strong id="pending">0</strong><span>Left to review</span></article>
      <article><strong id="excluded">0</strong><span>Excluded</span></article>
      <article><strong id="total">0</strong><span>Total records</span></article>
    </section>

    <section id="progress-section" class="progress-section" hidden>
      <div class="progress-label"><span>Completed</span><strong id="percent">0%</strong></div>
      <div class="progress-track"><div id="progress-bar" class="progress-bar"></div></div>
      <p id="last-updated" class="updated"></p>
      <p class="safe-note">Read-only page. Opening it does not change, merge, reset, or overwrite browser review work.</p>
    </section>

    <div class="actions">
      <button id="refresh" type="button">Refresh totals</button>
      <button id="sign-in" class="primary" type="button" hidden>Sign in with Dropbox</button>
      <button id="sign-out" type="button" hidden>Sign out</button>
      <a href="./">Open review viewer</a>
    </div>
  </main>
  <script src="assets/config.js?v=20260707-4"></script>
  <script src="assets/status.js?v=20260712-1"></script>
</body>
</html>
