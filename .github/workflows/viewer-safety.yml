name: Mario Viewer Safety

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  safety-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run deployment safety checks
        run: node tests/deployment-safety.mjs
      - name: Run mounted Dropbox path checks
        run: node tests/mounted-path-resolver.mjs
      - name: Run save hardening behavior checks
        run: node tests/save-hardening-behavior.mjs
      - name: Run AI note hydration behavior checks
        run: node tests/ai-note-hydrator-behavior.mjs
      - name: Run storage fallback behavior checks
        run: node tests/storage-fallback-behavior.mjs
      - name: Run project separation guard
        run: node tests/project-separation-guard.mjs
