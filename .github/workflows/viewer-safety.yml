name: Mario Viewer Safety

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mario-viewer-safety-${{ github.ref }}
  cancel-in-progress: true

jobs:
  viewer-regression:
    name: Viewer regression checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax-check JavaScript and test files
        run: |
          set -euo pipefail
          find assets tests tools -type f \( -name '*.js' -o -name '*.mjs' \) -print0 | xargs -0 -n1 node --check
          if [ -f test-viewer-logic.mjs ]; then
            node --check test-viewer-logic.mjs
          fi

      - name: Run required viewer regression suite
        run: |
          set -euo pipefail
          required_tests=(
            "test-viewer-logic.mjs"
            "tests/deployment-safety.mjs"
            "tests/mounted-path-resolver.mjs"
            "tests/save-hardening-behavior.mjs"
            "tests/ai-note-hydrator-behavior.mjs"
            "tests/storage-fallback-behavior.mjs"
            "tests/project-separation-guard.mjs"
            "tests/search-core.test.mjs"
          )
          for test_file in "${required_tests[@]}"; do
            if [ ! -f "$test_file" ]; then
              echo "Required safety test is missing: $test_file" >&2
              exit 1
            fi
            node "$test_file"
          done

      - name: Check search catalog builder
        run: python3 -m py_compile scripts/search_catalog_lib.py scripts/build_search_catalog.py

  static-quality:
    name: Static quality and dependency checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install code-quality tools
        run: npm install --no-audit --no-fund --loglevel error

      - name: Run ESLint bug-risk checks
        run: npm run lint

      - name: Run dependency vulnerability audit
        run: npm run audit:deps

      - name: Run Prettier formatting check advisory
        continue-on-error: true
        run: npm run format:check

  semgrep:
    name: Semgrep CE static scan
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    container:
      image: semgrep/semgrep
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Semgrep Community Edition scan
        run: semgrep scan --config .semgrep.yml --error --metrics=off assets
