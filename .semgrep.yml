rules:
  - id: masics-no-eval
    message: Do not use eval in the reviewer. It makes code execution unsafe and hard to verify.
    severity: ERROR
    languages: [javascript]
    pattern: eval(...)

  - id: masics-no-new-function
    message: Do not build executable code with new Function in the reviewer.
    severity: ERROR
    languages: [javascript]
    pattern: new Function(...)

  - id: masics-no-document-write
    message: Do not use document.write in the reviewer. It can overwrite the page and create injection risk.
    severity: ERROR
    languages: [javascript]
    pattern: document.write(...)

  - id: masics-no-string-timeout-double-quoted-code
    message: Do not pass string code to setTimeout. Use a function callback instead.
    severity: ERROR
    languages: [javascript]
    pattern: 'setTimeout("...", ...)'

  - id: masics-no-string-timeout-single-quoted-code
    message: Do not pass string code to setTimeout. Use a function callback instead.
    severity: ERROR
    languages: [javascript]
    pattern: "setTimeout('...', ...)"

  - id: masics-no-string-interval-double-quoted-code
    message: Do not pass string code to setInterval. Use a function callback instead.
    severity: ERROR
    languages: [javascript]
    pattern: 'setInterval("...", ...)'

  - id: masics-no-string-interval-single-quoted-code
    message: Do not pass string code to setInterval. Use a function callback instead.
    severity: ERROR
    languages: [javascript]
    pattern: "setInterval('...', ...)"
